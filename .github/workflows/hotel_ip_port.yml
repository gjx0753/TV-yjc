name: hotel IP and Port

on:
  schedule:
    # 每隔天下午3点自动运行（UTC时间，北京时间+8）
    - cron: '0 9 */7 * *'
  workflow_dispatch:

# 设置权限（重要！）
permissions:
  contents: write
  actions: read

jobs:
  hotel-ip:
    runs-on: ubuntu-latest
    
    # 解决 Node.js 20 弃用警告
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
        pip install pysocks
    
    - name: 提取hotel ip_port
      run: |
        cat > hotel_ip_port.py << 'EOFPYTHON'
        import requests
        import re
        import os
        import random
        import time
        import json
        import socket
        from concurrent.futures import ThreadPoolExecutor, as_completed
        
        HEADERS = {
            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
            'Accept': '*/*',
            'Accept-Language': 'zh-CN,zh;q=0.9,en;q=0.8',
            'Connection': 'keep-alive',
        }
        
        def check_tcp_connection(ip, port, timeout=3):
            try:
                sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                sock.settimeout(timeout)
                result = sock.connect_ex((ip, int(port)))
                sock.close()
                return result == 0
            except:
                return False
        
        def check_ip_availability(ip_port, timeout=5):
            try:
                ip, port = ip_port.split(':')
                if not check_tcp_connection(ip, port, timeout=2):
                    print(f"  {ip_port}: TCP连接失败")
                    return False, None
                
                print(f"  {ip_port}: TCP连接成功")
                test_urls = [
                    f"http://{ip_port}/iptv/live/1000.json?key=txiptv",
                    f"http://{ip_port}/ZHGXTV/Public/json/live_interface.txt",
                    f"http://{ip_port}/",
                ]
                
                for url in test_urls:
                    try:
                        response = requests.get(url, timeout=3, headers=HEADERS, verify=False)
                        if response.status_code == 200:
                            print(f"  {ip_port}: HTTP服务可用")
                            return True, url
                    except:
                        continue
                return False, None
            except Exception as e:
                return False, None
        
        def hotel_ip_port_from_urls(url_list):
            ip_port_set = set()
            print("步骤1: 从直播源URL提取IP和端口...")
            for url in url_list:
                try:
                    response = requests.get(url, timeout=15, headers=HEADERS, verify=False)
                    lines = response.text.splitlines()
                    for line in lines:
                        line = line.strip()
                        if not line or line.startswith('#') or ',' not in line:
                            continue
                        parts = line.split(',', 1)
                        if len(parts) < 2:
                            continue
                        url_part = parts[1].strip()
                        if 'tsfile' in url_part or 'hls' in url_part or 'm3u8' in url_part:
                            match = re.search(r'https?://([^:/]+):(\d+)', url_part)
                            if match:
                                ip_port_set.add(f"{match.group(1)}:{match.group(2)}")
                    print(f"  从 {url} 提取完成")
                except Exception as e:
                    print(f"处理URL {url} 时发生错误: {e}")
            
            print(f"共提取到 {len(ip_port_set)} 个IP:端口")
            ip_port_list = list(ip_port_set)
            
            print("步骤2: 检测IP端口有效性...")
            available_ips = []
            with ThreadPoolExecutor(max_workers=10) as executor:
                future_to_ip = {executor.submit(check_ip_availability, ip): ip for ip in ip_port_list}
                for future in as_completed(future_to_ip):
                    ip = future_to_ip[future]
                    try:
                        is_available, url = future.result()
                        if is_available:
                            available_ips.append((ip, url))
                    except:
                        pass
            
            print(f"可用IP端口: {len(available_ips)} 个")
            return available_ips
        
        if __name__ == "__main__":
            source_urls = [
                # 在这里添加您的直播源URL
            ]
            result = hotel_ip_port_from_urls(source_urls)
            
            output_dir = "Hotel/ip"
            os.makedirs(output_dir, exist_ok=True)
            output_file = os.path.join(output_dir, "hotel_ip.txt")
            with open(output_file, 'w', encoding='utf-8') as f:
                for ip, url in result:
                    f.write(f"{ip}\n")
            print(f"结果已保存到: {output_file}")
        EOFPYTHON
        
        python hotel_ip_port.py
    
    - name: Commit and push results
      if: success()
      run: |
        git config --global user.name "${{ github.actor }}"
        git config --global user.email "${{ github.actor }}@users.noreply.github.com"
        
        # 检查是否有文件变更
        if [ -n "$(git status --porcelain)" ]; then
          git add Hotel/ip/hotel_ip.txt
          git commit -m "自动更新hotel IP端口列表 [skip ci]"
          git push
        else
          echo "没有文件变更，跳过提交"
        fi
    
    - name: Upload results as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: hotel-ip-results
        path: Hotel/ip/hotel_ip.txt
        retention-days: 30
